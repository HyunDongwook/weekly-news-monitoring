name: Debug Google News Redirect (Playwright)

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: node scripts/debug-fetch2.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: debug-shot.png
