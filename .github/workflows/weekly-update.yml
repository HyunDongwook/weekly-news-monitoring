name: Weekly News Update

on:
  schedule:
    # 00:07 UTC every Monday = 09:07 KST every Monday
    - cron: '7 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update news data
        run: node scripts/update-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-week-data.js data/archive-data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly news data update"
            git push
          fi
