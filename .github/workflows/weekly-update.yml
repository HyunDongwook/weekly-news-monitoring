name: Weekly News Update

on:
  schedule:
    # 00:07 UTC every Monday = 09:07 KST every Monday
    - cron: '7 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update news data (Naver News Search API)
        if: false # TEMP: redeploy trigger
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/update-news.mjs

      - name: Commit and push if changed
        if: false # TEMP: redeploy trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-week-data.js data/archive-data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly news data update"
            git push
          fi

      # Pushes made with the workflow's own GITHUB_TOKEN don't trigger GitHub
      # Pages' classic "Deploy from a branch" auto-build, so this workflow
      # deploys the site itself right after updating the data.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
