name: Weekly News Candidate Collection

on:
  schedule:
    # 00:07 UTC every Monday = 09:07 KST every Monday (primary)
    - cron: '7 0 * * 1'
    # 23:35 UTC every Sunday = 08:35 KST every Monday (backup, in case the
    # primary run above is delayed or dropped by GitHub's scheduler)
    - cron: '35 23 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect news candidates (Naver News Search API)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/update-news.mjs

      # This step only stages the raw candidate list (data/candidates.json).
      # Curation (reading each article, filtering out short news/photo/ad
      # pieces, dropping duplicates) and publishing to current-week-data.js /
      # archive-data.js happens separately, outside this workflow.
      - name: Commit candidates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/candidates.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly news candidates collected"
            git push
          fi
