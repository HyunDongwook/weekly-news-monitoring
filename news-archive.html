<script>
  (function () {
    var weeks = window.ARCHIVE_WEEKS || [];
    var listEl = document.getElementById("archiveList");

    if (weeks.length === 0) {
      document.getElementById("emptyState").style.display = "block";
      return;
    }

    var PAGE_SIZE = 10;

    weeks.forEach(function (week, idx) {
      var details = document.createElement("details");
      details.className = "archive-week";
      if (idx === 0) details.open = true;

      var articles = week.articles || [];
      var count = articles.length;
      var summary = document.createElement("summary");
      summary.innerHTML =
        '<span>' + window.NewsSite.escapeHtml(week.periodLabel || "") + '<span class="count-badge">기사 ' + count + '건</span></span>' +
        '<span class="chev">▶</span>';
      details.appendChild(summary);

      var rowsEl = document.createElement("div");
      rowsEl.className = "archive-week__rows";
      details.appendChild(rowsEl);

      var totalPages = Math.max(1, Math.ceil(count / PAGE_SIZE));
      var currentPage = 1;

      var paginationEl = document.createElement("div");
      paginationEl.className = "archive-pagination";
      details.appendChild(paginationEl);

      function renderPagination() {
        if (totalPages <= 1) {
          paginationEl.innerHTML = "";
          return;
        }
        var html =
          '<button type="button" class="archive-pagination__btn" data-page="' + (currentPage - 1) + '"' +
          (currentPage === 1 ? " disabled" : "") + '>‹</button>';
        for (var p = 1; p <= totalPages; p++) {
          html +=
            '<button type="button" class="archive-pagination__btn' + (p === currentPage ? " is-active" : "") + '" data-page="' + p + '">' +
            p + "</button>";
        }
        html +=
          '<button type="button" class="archive-pagination__btn" data-page="' + (currentPage + 1) + '"' +
          (currentPage === totalPages ? " disabled" : "") + '>›</button>';
        paginationEl.innerHTML = html;
      }

      function renderPage(page) {
        currentPage = page;
        rowsEl.innerHTML = "";
        var start = (page - 1) * PAGE_SIZE;
        articles.slice(start, start + PAGE_SIZE).forEach(function (article) {
          rowsEl.appendChild(window.NewsSite.buildArchiveRow(article));
        });
        renderPagination();
      }

      paginationEl.addEventListener("click", function (e) {
        var btn = e.target.closest(".archive-pagination__btn");
        if (!btn || btn.disabled) return;
        var page = parseInt(btn.getAttribute("data-page"), 10);
        if (page >= 1 && page <= totalPages) renderPage(page);
      });

      renderPage(1);
      listEl.appendChild(details);
    });

    window.NewsSite.attachInteractionHandlers(listEl);
  })();
</script>
